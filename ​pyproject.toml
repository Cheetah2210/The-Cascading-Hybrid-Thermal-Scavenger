[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chts"
version = "3.0.0"
description = "Cascading Hybrid Thermal Scavenger simulation engine for data center exergy reclamation."
readme = "README.md"
authors = [{ name = "Emily O. (Cheetahs Creations)" }]
license = { text = "CERN-OHL-W-2.0" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.22.0",
    "scipy>=1.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
