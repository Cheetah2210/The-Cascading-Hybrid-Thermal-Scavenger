# Home Assistant MQTT Sensor Configuration
# Place this in your configuration.yaml file

mqtt:
  sensor:

    # Stage 1 Exhaust Temperature Input
    - name: "CHTS Exhaust Temperature"
      unique_id: "chts_exhaust_temp"
      state_topic: "chts/stage1/temp_in"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"

    # Stage 2 Ambient Discharge Temperature
    - name: "CHTS Discharge Temperature"
      unique_id: "chts_discharge_temp"
      state_topic: "chts/stage2/temp_out"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"

    # Live Voltage Generated by the MHD Channel
    - name: "CHTS MHD Voltage Output"
      unique_id: "chts_mhd_voltage"
      state_topic: "chts/stage1/voltage"
      unit_of_measurement: "mV"
      device_class: "voltage"
      state_class: "measurement"

    # Calculated Total Power Recovered
    - name: "CHTS Power Recovered"
      unique_id: "chts_power_recovered"
      state_topic: "chts/total/power"
      unit_of_measurement: "mW"
      device_class: "power"
      state_class: "measurement"
